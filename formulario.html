<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calificar Página - MOONTON</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #f4f4f4;
      font-family: 'Arial', sans-serif;
      color: #333;
    }
    .container {
      width: 90%;
      max-width: 500px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #000;
      margin-bottom: 25px;
      font-size: 24px;
    }
    .stars {
      font-size: 40px;
      color: #ddd;
      margin: 15px 0;
    }
    .stars i {
      cursor: pointer;
      transition: color 0.2s;
    }
    .stars i:hover, .stars i.active {
      color: #ffcc00;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 16px;
      resize: vertical;
    }
    button {
      margin-top: 20px;
      padding: 12px 30px;
      background: #000;
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #333;
    }
    .back {
      display: block;
      margin-top: 20px;
      color: #0066cc;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="container">
    <h1>¡Califica nuestra página!</h1>
    
    <div class="stars" id="stars">
      <i class="far fa-star" data-value="1"></i>
      <i class="far fa-star" data-value="2"></i>
      <i class="far fa-star" data-value="3"></i>
      <i class="far fa-star" data-value="4"></i>
      <i class="far fa-star" data-value="5"></i>
    </div>
    <input type="hidden" id="rating" value="0">

    <textarea placeholder="¿Qué te pareció la página? (Opcional)" rows="4"></textarea>
    
    <button onclick="alert('¡Gracias por tu calificación!')">Enviar</button>
    
    <a href="index.html" class="back">← Volver</a>
  </div>

  <script>
    const stars = document.querySelectorAll('#stars i');
    stars.forEach(star => {
      star.addEventListener('click', () => {
        const value = star.getAttribute('data-value');
        document.getElementById('rating').value = value;
        stars.forEach(s => {
          s.classList.remove('active');
          if (s.getAttribute('data-value') <= value) {
            s.classList.add('active');
            s.classList.replace('far', 'fas');
          } else {
            s.classList.replace('fas', 'far');
          }
        });
      });
    });
  </script>
</body>
</html>
