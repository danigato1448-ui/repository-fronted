<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventracker - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
        }
        .sidebar {
            width: 280px;
            height: 100vh;
            background: linear-gradient(135deg, #343a40, #495057); 
            color: white;
            position: fixed;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
        }
        .sidebar h2 {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        .sidebar i { margin-right: 15px; }
        
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        .table thead th {
            background-color: #343a40;
            color: white;
            text-align: center;
        }
        .table td { vertical-align: middle; text-align: center; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>Inventracker</h2>
        <nav>
            <a href="dashboard.html"><i class="material-icons">dashboard</i>Dashboard</a>
            <a href="gestion-usuarios.html"><i class="material-icons">people</i>Usuarios</a>
            <a href="gestion-productos.html"><i class="material-icons">inventory</i>Productos</a>
            <a href="gestion-proveedores.html"><i class="material-icons">business</i>Proveedores</a>
            <a href="gestion-movimientos.html"><i class="material-icons">swap_horiz</i>Movimientos</a>
            <a href="alertas.html"><i class="material-icons">warning</i>Alertas</a>
        </nav>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2);">
            <p class="text-center small mb-2">Bienvenido, <strong id="nombre-usuario">Cargando...</strong></p>
            <a href="#" onclick="cerrarSesion()" class="bg-danger justify-content-center py-2 text-white d-flex align-items-center" style="text-decoration: none; border-radius: 8px;">
                <i class="material-icons" style="margin-right: 5px;">logout</i> Salir
            </a>
        </div>
    </aside>
    
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Gestión de Usuarios</h1>
            <button id="btn-agregar" class="btn btn-success" style="display: none;" onclick="window.location.href='nuevo-usuario.html'">
                <i class="material-icons" style="font-size: 18px; vertical-align: middle;">add</i> Nuevo Usuario
            </button>
        </div>

        <div class="table-responsive bg-white p-4 rounded shadow-sm">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Rol</th>
                        <th>Usuario</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios-body">
                    <tr><td colspan="4" class="text-center">Cargando usuarios...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // USA ESTA URL QUE ES LA QUE FUNCIONA EN TUS OTROS ARCHIVOS
        const API_URL = "https://inventracker-backend-production-24b9.up.railway.app"; 
        
        document.addEventListener("DOMContentLoaded", () => {
            const usuarioLogueado = localStorage.getItem('usuario') || "Usuario";
            const rolLogueado = localStorage.getItem('rol');
            
            document.getElementById('nombre-usuario').innerText = usuarioLogueado;
            
            // Mostrar botón de agregar solo si es Administrador
            if (rolLogueado === 'Administrador') {
                document.getElementById('btn-agregar').style.display = 'block';
            }

            cargarUsuarios(rolLogueado);
            marcarMenu();
        });

        async function cargarUsuarios(rolActual) {
            const tabla = document.getElementById('tabla-usuarios-body');
            try {
                const response = await fetch(`${API_URL}/api/usuarios`);
                if (!response.ok) throw new Error("No se pudo conectar con el servidor");
                
                const usuarios = await response.json();
                tabla.innerHTML = '';
                
                if (usuarios.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="4">No hay usuarios registrados</td></tr>';
                    return;
                }

                usuarios.forEach(u => {
                    const esAdmin = rolActual === 'Administrador';
                    
                    const accionesHtml = esAdmin ? `
                        <button class="btn btn-outline-primary btn-sm me-2" onclick="irAEditar(${u.id})">
                            <i class="material-icons" style="font-size: 18px;">edit</i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm" onclick="eliminarUsuario(${u.id}, '${u.nombre}')">
                            <i class="material-icons" style="font-size: 18px;">delete</i>
                        </button>
                    ` : `<span class="badge bg-secondary">Solo lectura</span>`;

                    tabla.innerHTML += `
                        <tr>
                            <td><strong>${u.nombre}</strong></td>
                            <td><span class="badge ${u.rol === 'Administrador' ? 'bg-dark' : 'bg-info text-dark'}">${u.rol}</span></td>
                            <td>${u.usuario}</td>
                            <td>${accionesHtml}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                tabla.innerHTML = '<tr><td colspan="4" class="text-danger">Error al cargar datos. Verifica la conexión con Railway.</td></tr>';
            }
        }

        function irAEditar(id) {
            window.location.href = `editar-usuario.html?id=${id}`;
        }

        async function eliminarUsuario(id, nombre) {
            const result = await Swal.fire({
                title: `¿Eliminar a ${nombre}?`,
                text: "Esta acción borrará al usuario permanentemente.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            });

            if (result.isConfirmed) {
                try {
                    const response = await fetch(`${API_URL}/api/usuarios/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        Swal.fire('¡Eliminado!', 'El usuario ha sido borrado.', 'success');
                        cargarUsuarios(localStorage.getItem('rol'));
                    } else {
                        throw new Error();
                    }
                } catch (error) {
                    Swal.fire('Error', 'No se pudo eliminar el usuario.', 'error');
                }
            }
        }

        function marcarMenu() {
            const currentFile = window.location.pathname.split("/").pop().toLowerCase() || "dashboard.html";
            const menuLinks = document.querySelectorAll('.sidebar a');
            menuLinks.forEach(link => {
                const linkFile = link.getAttribute('href').toLowerCase();
                if (currentFile === linkFile) link.classList.add("active");
            });
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
