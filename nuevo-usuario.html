<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventracker - Nuevo Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">Registrar Nuevo Usuario</h4>
                    </div>
                    <div class="card-body">
                        <form id="formNuevoUsuario">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nombre de Usuario (Login)</label>
                                <input type="text" id="usuario" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select id="id_rol" class="form-select">
                                    <option value="1">Administrador</option>
                                    <option value="2">Empleado</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <button type="button" class="btn btn-secondary" onclick="window.location.href='gestion-usuarios.html'">Cancelar</button>
                                <button type="submit" class="btn btn-success">Guardar Usuario</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://inventracker-backend-production-24b9.up.railway.app";

        // Protección de ruta
        if (localStorage.getItem('rol')?.toLowerCase() !== 'administrador') {
            window.location.href = 'index.html';
        }

        document.getElementById('formNuevoUsuario').addEventListener('submit', async (e) => {
    e.preventDefault();
    console.log("Intentando crear usuario..."); // Para saber si el botón al menos responde

    const nuevoUsuario = {
        nombre: document.getElementById('nombre').value,
        usuario: document.getElementById('usuario').value,
        password: document.getElementById('password').value,
        id_rol: parseInt(document.getElementById('id_rol').value),
        estado: 'Activo'
    };

    try {
        const res = await fetch(`${API_URL}/api/usuarios`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(nuevoUsuario)
        });

        const data = await res.json(); // Intentar leer la respuesta del servidor
        console.log("Respuesta del servidor:", data);

        if (res.ok) {
            Swal.fire('¡Creado!', 'Usuario registrado con éxito', 'success')
                .then(() => window.location.href = 'gestion-usuarios.html');
        } else {
            // Si el servidor responde con error (ej. 500), mostrar el mensaje real
            Swal.fire('Error', data.error || 'Error al crear usuario', 'error');
        }
    } catch (error) {
        console.error("Error de conexión:", error);
        Swal.fire('Error de Red', 'No se pudo conectar con el servidor. Revisa la consola.', 'error');
    }
});

    </script>
</body>
</html>
