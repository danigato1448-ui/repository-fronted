<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventracker - Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Editar Datos de Usuario</h4>
                    </div>
                    <div class="card-body">
                        <form id="formEditarUsuario">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select id="estado" class="form-select">
                                    <option value="Activo">Activo</option>
                                    <option value="Inactivo">Inactivo</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select id="id_rol" class="form-select">
                                    <option value="1">Administrador</option>
                                    <option value="2">Empleado</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <button type="button" class="btn btn-secondary" onclick="window.location.href='gestion-usuarios.html'">Volver</button>
                                <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_URL = "https://inventracker-backend-production-24b9.up.railway.app";
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    async function cargarDatos() {
        if (!userId) return;
        try {
            const res = await fetch(`${API_URL}/api/usuarios/${userId}`);
            if (!res.ok) throw new Error("No se encontró el usuario");
            
            const data = await res.json();
            
            // CORRECCIÓN: Solo asignamos campos que EXISTEN en el HTML
            document.getElementById('nombre').value = data.nombre || "";
            document.getElementById('estado').value = data.estado || "Activo";
            // Usamos el id_rol que viene directo de la DB
            document.getElementById('id_rol').value = data.id_rol;

        } catch (error) {
            console.error(error);
            Swal.fire('Error', 'No se pudieron cargar los datos del usuario', 'error');
        }
    }

    document.addEventListener("DOMContentLoaded", cargarDatos);

    document.getElementById('formEditarUsuario').addEventListener('submit', async (e) => {
        e.preventDefault();
        const editado = {
            nombre: document.getElementById('nombre').value,
            estado: document.getElementById('estado').value,
            id_rol: document.getElementById('id_rol').value
        };

        try {
            const res = await fetch(`${API_URL}/api/usuarios/${userId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(editado)
            });

            if (res.ok) {
                Swal.fire('¡Actualizado!', 'Datos guardados correctamente', 'success')
                    .then(() => window.location.href = 'gestion-usuarios.html');
            } else {
                throw new Error("Error en la actualización");
            }
        } catch (error) {
            Swal.fire('Error', 'No se pudo actualizar el usuario', 'error');
        }
    });
</script>
</body>
</html>
