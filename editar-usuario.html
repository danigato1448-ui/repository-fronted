<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventracker - Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Editar Datos de Usuario</h4>
                    </div>
                    <div class="card-body">
                        <form id="formEditarUsuario">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select id="estado" class="form-select">
                                    <option value="Activo">Activo</option>
                                    <option value="Inactivo">Inactivo</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select id="id_rol" class="form-select">
                                    <option value="1">Administrador</option>
                                    <option value="2">Empleado</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <button type="button" class="btn btn-secondary" onclick="window.location.href='gestion-usuarios.html'">Volver</button>
                                <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_URL = "https://inventracker-backend-production-24b9.up.railway.app";
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    async function cargarDatos() {
    if (!userId) return;
    try {
        const res = await fetch(`${API_URL}/api/usuarios/${userId}`);
        
        // Si el servidor responde 404 o 500, lanzamos el error antes de intentar leer el JSON
        if (!res.ok) throw new Error("Servidor no responde correctamente");
        
        const data = await res.json();
        console.log("Datos recibidos:", data); // Mira esto en la consola (F12)

        // Verificamos que 'data' exista antes de asignar
        if (data) {
            document.getElementById('nombre').value = data.nombre || "";
            document.getElementById('estado').value = data.estado || "Activo";
            
            // Forzamos a que si no viene el ID, use el 2 (Empleado) por defecto para que no falle el select
            document.getElementById('id_rol').value = data.id_rol || 2; 
        }

    } catch (error) {
        console.error("Detalle del error:", error);
        // Solo mostramos la alerta de SweetAlert si realmente falló la conexión
        Swal.fire('Atención', 'Hubo un problema al conectar con el servidor', 'warning');
    }
}

    document.addEventListener("DOMContentLoaded", cargarDatos);

    document.getElementById('formEditarUsuario').addEventListener('submit', async (e) => {
        e.preventDefault();
        const editado = {
            nombre: document.getElementById('nombre').value,
            estado: document.getElementById('estado').value,
            id_rol: parseInt(document.getElementById('id_rol').value)
        };

        try {
        const res = await fetch(`${API_URL}/api/usuarios/${userId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(editado)
        });

        if (res.ok) {
            Swal.fire({
                icon: 'success',
                title: '¡Actualizado!',
                text: 'El rol ha sido cambiado con éxito',
                confirmButtonText: 'OK'
            }).then(() => {
                window.location.href = 'gestion-usuarios.html';
            });
        } else {
            const errorData = await res.json();
            throw new Error(errorData.error || "Error al actualizar");
        }
    } catch (error) {
        console.error(error);
        Swal.fire('Error', 'No se pudo cambiar el rol: ' + error.message, 'error');
    }
});
</script>
</body>
</html>
