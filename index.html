<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventracker - Inicio de sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container { max-width: 400px; margin: 0 auto; }
        .header-container { display: flex; justify-content: center; align-items: center; margin-top: 40px; }
        .logo { margin-right: 10px; }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="header-container">
            <img src="logo.png" alt="Logo" width="100"> 
            <h2 class="text-center">Inventracker</h2>
        </div>

        <div class="form-container mt-5">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="contrasena" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="background-color: rgb(248, 69, 45); border: none;">
                    Iniciar sesión
                </button>
            </form>
        </div>
    </div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const API_BASE_URL = "https://inventracker-backend-production-24b9.up.railway.app";

        // ==================== FUNCIÓN DE LOGIN ====================
        async function login(usuario, password) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        usuario: usuario.trim(), 
                        password: password.trim() 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Guardar sesión
                    localStorage.setItem('usuario', data.user);
                    localStorage.setItem('rol', data.rol); 
                    localStorage.setItem('estado', data.estado);

                    alert(`✅ ¡Bienvenido ${data.user || usuario}!`);
                    
                    // Redirección al dashboard
                    window.location.href = "dashboard.html";
                } 
                else {
                    alert(`❌ ${data.message || "Usuario o contraseña incorrectos"}`);
                }
            } 
            catch (error) {
                console.error("Error de conexión:", error);
                alert("❌ No se pudo conectar con el servidor.\n\nVerifica que el backend esté activo en Railway.");
            }
        }

        // ==================== EVENTO DEL FORMULARIO ====================
       document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('usuario').value;
        const p = document.getElementById('contrasena').value;
        await login(u, p);
    });
</script>
