<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventracker - Inicio de sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-control {
            height: 38px;
        }

        .btn {
            width: 100%;
            height: 40px;
        }

        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            margin-top: 40px;
            margin-right: 100px;
        }

        .logo {
            margin-right: 10px; 
            margin-top: 40px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container">
        <div class="header-container">
            <img src="Logo.png" alt="Logo Inventracker" class="logo" width="150" height="100"> 
            <h2 class="text-center" style="margin-top: 50px;">Inventracker</h2>
        </div>

        <div class="form-container mt-5">
            <form id="loginForm">
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="usuario" placeholder="Ingrese su usuario" required>
                </div>
                <div class="mb-3">
                    <label for="contrasena" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="contrasena" placeholder="Ingrese su contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary" style="background-color: rgb(248, 69, 45);">Iniciar sesión</button>
            </form>
        </div>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            window.location.href = "dashboard.html"; 
        });
    </script>
</body>
</html>
